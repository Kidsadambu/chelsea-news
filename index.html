<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chelsea News</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <h1>Chelsea News</h1>
  <p>ข่าว Chelsea FC ทีมชาย และ ทีมหญิง</p>
</header>

<main id="news-container"></main>

<footer>
  <p>© 2026 Chelsea News</p>
</footer>

<script>
const supabaseUrl = 'https://uxvemlixicxlrpptjpjg.supabase.co';
const supabaseKey = 'sb_publishable_uEzdUCurZtKLMpOXYfFPGA_BAYLepLR';

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function loadPosts() {

  const container = document.getElementById('news-container');

  const { data, error } = await client
    .from('posts')
    .select('*')
    .eq('status', 'published')
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = '<p>โหลดข่าวไม่สำเร็จ</p>';
    return;
  }

  if (!data.length) {
    container.innerHTML = '<p>ยังไม่มีข่าว</p>';
    return;
  }

  container.innerHTML = data.map(post => `
    <section class="news-card">

      <img src="${post.thumbnail || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1200&auto=format&fit=crop'}">

      <div style="padding:15px;">

        <small>${post.category}</small>

        <h2>${post.title}</h2>

        <p>${post.content.substring(0,120)}...</p>

        <a href="article.html?slug=${post.slug}" style="display:inline-block;margin-top:10px;color:#034694;font-weight:bold;text-decoration:none;">
          อ่านต่อ
        </a>

      </div>

    </section>
  `).join('');
}

loadPosts();
</script>

</body>
</html>
