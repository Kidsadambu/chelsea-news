<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chelsea News Article</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <h1>Chelsea News</h1>
</header>

<main id="article-container" style="max-width:900px;margin:auto;padding:20px;"></main>

<footer>
  <p>© 2026 Chelsea News</p>
</footer>

<script>

const supabaseUrl = 'https://uxvemlixicxlrpptjpjg.supabase.co';

const supabaseKey = 'sb_publishable_uEzdUCurZtKLMpOXYfFPGA_BAYLepLR';

const client = supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);

const slug = params.get('slug');

async function loadArticle() {

  const container = document.getElementById('article-container');

  const { data, error } = await client
    .from('posts')
    .select('*')
    .eq('slug', slug)
    .single();

  if (error || !data) {
    container.innerHTML = '<h2>ไม่พบบทความ</h2>';
    return;
  }

  document.title = data.title;

  container.innerHTML = `
  
    <article class="news-card">

      <img 
        src="${data.thumbnail || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1200&auto=format&fit=crop'}"
        style="width:100%;height:400px;object-fit:cover;"
      >

      <div style="padding:20px;">

        <small>${data.category}</small>

        <h1>${data.title}</h1>

        <p style="line-height:1.8;font-size:18px;">
          ${data.content}
        </p>

      </div>

    </article>

  `;
}

loadArticle();

</script>

</body>
</html>
