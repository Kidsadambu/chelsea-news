<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chelsea CMS Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>

<header>
  <h1>Chelsea News CMS</h1>
  <p>ระบบจัดการข่าว Chelsea FC</p>
</header>

<main>

<section class="news-card">

<h2>เขียนข่าวใหม่</h2>

<input id="title" type="text" placeholder="หัวข้อข่าว" style="width:100%;padding:12px;margin-bottom:10px;">

<input id="thumbnail" type="text" placeholder="URL รูปภาพ Featured Image" style="width:100%;padding:12px;margin-bottom:10px;">

<select id="category" style="width:100%;padding:12px;margin-bottom:10px;">
<option value="Chelsea Men">Chelsea Men</option>
<option value="Chelsea Women">Chelsea Women</option>
</select>

<select id="status" style="width:100%;padding:12px;margin-bottom:10px;">
<option value="draft">Draft</option>
<option value="published">Published</option>
</select>

<div id="editor" style="height:300px;background:white;margin-bottom:15px;"></div>

<button onclick="createPost()" style="padding:12px 20px;background:#034694;color:white;border:none;cursor:pointer;width:100%;margin-bottom:10px;">
Publish News
</button>

<button onclick="logout()" style="padding:12px 20px;background:red;color:white;border:none;cursor:pointer;width:100%;">
Logout
</button>

<p id="message" style="margin-top:15px;"></p>

</section>

<section class="news-card">
<h2>รายการข่าว</h2>
<div id="posts-table"></div>
</section>

</main>

<script>
const supabaseUrl = 'https://uxvemlixicxlrpptjpjg.supabase.co';
const supabaseKey = 'sb_publishable_uEzdUCurZtKLMpOXYfFPGA_BAYLepLR';

const client = supabase.createClient(supabaseUrl, supabaseKey);

const session = localStorage.getItem('chelsea-session');

if (!session) {
  window.location.href = 'admin.html';
}

const quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: 'เขียนข่าว Chelsea...',
  modules: {
    toolbar: [
      [{ header: [1, 2, 3, false] }],
      ['bold', 'italic', 'underline'],
      [{ list: 'ordered'}, { list: 'bullet' }],
      ['link', 'blockquote'],
      ['clean']
    ]
  }
});

function slugify(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)+/g, '');
}

async function createPost() {

  const title = document.getElementById('title').value;
  const thumbnail = document.getElementById('thumbnail').value;
  const category = document.getElementById('category').value;
  const status = document.getElementById('status').value;
  const content = quill.root.innerHTML;
  const message = document.getElementById('message');

  const slug = slugify(title);

  const { error } = await client
    .from('posts')
    .insert([
      {
        title,
        slug,
        thumbnail,
        category,
        content,
        status
      }
    ]);

  if (error) {
    message.style.color = 'red';
    message.innerText = error.message;
    return;
  }

  message.style.color = 'green';
  message.innerText = 'เผยแพร่ข่าวเรียบร้อยแล้ว';

  document.getElementById('title').value = '';
  document.getElementById('thumbnail').value = '';
  quill.root.innerHTML = '';

  loadPosts();
}

async function loadPosts() {

  const table = document.getElementById('posts-table');

  const { data } = await client
    .from('posts')
    .select('*')
    .order('created_at', { ascending: false });

  if (!data || !data.length) {
    table.innerHTML = '<p>ยังไม่มีข่าว</p>';
    return;
  }

  table.innerHTML = data.map(post => `

    <div style="border-bottom:1px solid #ddd;padding:15px 0;">

      <h3>${post.title}</h3>

      <small>${post.category} | ${post.status}</small>

      <div style="margin-top:10px;">

        <button onclick="deletePost(${post.id})" style="background:red;color:white;border:none;padding:8px 12px;cursor:pointer;">
          Delete
        </button>

      </div>

    </div>

  `).join('');
}

async function deletePost(id) {

  await client
    .from('posts')
    .delete()
    .eq('id', id);

  loadPosts();
}

function logout() {
  localStorage.removeItem('chelsea-session');
  window.location.href = 'admin.html';
}

loadPosts();

</script>

</body>
</html>
