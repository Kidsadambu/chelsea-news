<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Chelsea News Admin</h1>
  </header>

  <main>
    <section class="news-card">
      <h2>Login Admin</h2>
      <form>
        <input type="text" placeholder="Admin ID" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">
        <button style="padding:10px 20px;background:#034694;color:white;border:none;">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
